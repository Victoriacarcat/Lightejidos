<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contáctanos — Lightejidos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ---- SECCIÓN CONTACTO ---- */
    .seccion-contacto {
      position: relative;
      min-height: 600px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    /* Panel verde izquierdo: 1/4 del ancho */
    .contacto-panel-verde {
      width: 25%;
      background: var(--oliva);
      flex-shrink: 0;
    }

    /* Imagen de fondo: 3/4 restante */
    .contacto-fondo-imagen {
      flex: 1;
      background: url('img/contacto-bg.jpg') center/cover no-repeat;
      background-color: var(--crema);
      min-height: 500px;
    }

    /* Tarjeta flotante sobre la unión */
    .contacto-tarjeta {
      position: absolute;
      top: 50%;
      left: 18%;
      transform: translateY(-50%);
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 40px 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      z-index: 10;
    }

    .contacto-tarjeta h1 {
      font-family: var(--fuente-display);
      font-size: var(--fs-32);
      font-weight: 700;
      color: var(--oscuro);
      margin-bottom: 8px;
    }

    .contacto-tarjeta .subtitulo {
      font-size: var(--fs-16);
      color: rgba(0,0,0,0.55);
      margin-bottom: 24px;
    }

    /* Campos del formulario */
    .campo-form {
      background: var(--crema);
      border: none;
      border-radius: var(--radio);
      padding: 14px 16px;
      font-family: var(--fuente-cuerpo);
      font-size: var(--fs-16);
      color: var(--oscuro);
      width: 100%;
      margin-bottom: 16px;
      outline: none;
      transition: box-shadow var(--transicion);
    }
    .campo-form:focus { box-shadow: 0 0 0 2px var(--vino); }
    .campo-form::placeholder { color: rgba(0,0,0,0.35); }
    .campo-form.error-campo { box-shadow: 0 0 0 2px #e53e3e; }
    textarea.campo-form { resize: vertical; min-height: 140px; }

    .mensaje-error {
      color: #e53e3e;
      font-size: var(--fs-16);
      margin-top: -12px;
      margin-bottom: 12px;
      display: none;
    }
    .mensaje-error.visible { display: block; }

    .btn-enviar {
      background: var(--vino);
      color: var(--blanco);
      font-family: var(--fuente-cuerpo);
      font-size: var(--fs-16);
      font-weight: 700;
      border: none;
      border-radius: var(--radio);
      padding: 14px 32px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
      transition: background var(--transicion);
    }
    .btn-enviar:hover { background: var(--vino-hover); }
    .btn-enviar:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Confirmación */
    .confirmacion {
      display: none;
      background: var(--oliva);
      color: var(--blanco);
      border-radius: var(--radio);
      padding: 14px 16px;
      margin-top: 16px;
      font-size: var(--fs-16);
    }
    .confirmacion.visible { display: block; }

    /* Responsive */
    @media (max-width: 767px) {
      .seccion-contacto {
        flex-direction: column;
        min-height: unset;
      }
      .contacto-panel-verde { width: 100%; min-height: 80px; }
      .contacto-fondo-imagen { min-height: 300px; }
      .contacto-tarjeta {
        position: relative;
        top: unset;
        left: unset;
        transform: none;
        max-width: 100%;
        margin: -40px 16px 24px;
        border-radius: var(--radio);
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- CARRITO LATERAL -->
  <div id="cart-placeholder"></div>

  <section class="seccion-contacto">

    <!-- Panel verde izquierdo (1/4) -->
    <div class="contacto-panel-verde"></div>

    <!-- Imagen fondo derecho (3/4) -->
    <div class="contacto-fondo-imagen">
      <img src="imagenes/tejiendo1.png" alt="imagen ilustración tejiendo">
    </div>

    <!-- Tarjeta flotante sobre la unión -->
    <div class="contacto-tarjeta">
      <h1>Contáctanos</h1>
      <p class="subtitulo">Estaremos encantados de atenderte</p>

      <input
        type="text"
        class="campo-form"
        id="contacto-nombre"
        placeholder="Nombre"
        maxlength="100"
        aria-label="Tu nombre"
      >
      <p class="mensaje-error" id="error-nombre">Por favor escribe tu nombre.</p>

      <textarea
        class="campo-form"
        id="contacto-mensaje"
        placeholder="Escribe tu mensaje..."
        maxlength="1000"
        aria-label="Tu mensaje"
      ></textarea>
      <p class="mensaje-error" id="error-mensaje">Por favor escribe tu mensaje.</p>

      <button class="btn-enviar" id="btn-enviar">
        Enviar mensaje
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <div class="confirmacion" id="confirmacion">
        ✅ ¡Mensaje enviado! Te contactaremos pronto.
      </div>
    </div>

  </section>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btnEnviar      = document.getElementById('btn-enviar');
      const campoNombre    = document.getElementById('contacto-nombre');
      const campoMensaje   = document.getElementById('contacto-mensaje');
      const errorNombre    = document.getElementById('error-nombre');
      const errorMensaje   = document.getElementById('error-mensaje');
      const confirmacion   = document.getElementById('confirmacion');

      const EMAIL_DESTINO  = 'registrosvictoria2@gmail.com';
      const WA_NUMERO      = '573003925381';

      function limpiarErrores() {
        campoNombre.classList.remove('error-campo');
        campoMensaje.classList.remove('error-campo');
        errorNombre.classList.remove('visible');
        errorMensaje.classList.remove('visible');
      }

      function validarFormulario() {
        let valido = true;
        limpiarErrores();

        const nombre  = campoNombre.value.trim();
        const mensaje = campoMensaje.value.trim();

        if (!nombre) {
          campoNombre.classList.add('error-campo');
          errorNombre.classList.add('visible');
          valido = false;
        }
        if (!mensaje) {
          campoMensaje.classList.add('error-campo');
          errorMensaje.classList.add('visible');
          valido = false;
        }
        return valido;
      }

      btnEnviar?.addEventListener('click', () => {
        if (!validarFormulario()) return;

        const nombre  = campoNombre.value.trim();
        const mensaje = campoMensaje.value.trim();

        btnEnviar.disabled = true;
        btnEnviar.textContent = 'Enviando...';

        try {
          /* Enviar por WhatsApp */
          const textoWa = `¡Hola! Soy ${nombre}.\n\n${mensaje}`;
          window.open(`https://wa.me/${WA_NUMERO}?text=${encodeURIComponent(textoWa)}`, '_blank');

          /* Enviar por email (mailto como fallback) */
          const asunto  = encodeURIComponent(`Mensaje de contacto — ${nombre}`);
          const cuerpo  = encodeURIComponent(mensaje);
          window.location.href = `mailto:${EMAIL_DESTINO}?subject=${asunto}&body=${cuerpo}`;
        } catch (error) {
          console.error('Error al enviar el mensaje:', error);
        }

        /* Limpiar y mostrar confirmación */
        campoNombre.value  = '';
        campoMensaje.value = '';
        confirmacion.classList.add('visible');

        setTimeout(() => {
          confirmacion.classList.remove('visible');
          btnEnviar.disabled = false;
          btnEnviar.innerHTML = `Enviar mensaje
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>`;
        }, 4000);
      });

      /* Limpiar error al escribir */
      campoNombre.addEventListener('input', () => {
        campoNombre.classList.remove('error-campo');
        errorNombre.classList.remove('visible');
      });
      campoMensaje.addEventListener('input', () => {
        campoMensaje.classList.remove('error-campo');
        errorMensaje.classList.remove('visible');
      });
    });
  </script>
</body>
</html>
