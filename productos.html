<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestros Productos — Lightejidos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .pagina-productos {
      padding: 48px 0;
      background: var(--blanco);
    }

    .titulo-pagina {
      font-family: var(--fuente-display);
      font-size: var(--fs-48);
      font-weight: 700;
      color: var(--vino);
      text-align: center;
      margin-bottom: 40px;
    }

    .seccion-categoria {
      margin-bottom: 40px;
    }
    .seccion-categoria:last-child {
      margin-bottom: 0;
    }

    /* Cabecera de categoría con rango de precios */
    .categoria-cabecera {
      border: 2px solid rgba(107, 18, 0, 0.3);
      border-bottom: none;
      border-radius: var(--radio) var(--radio) 0 0;
      padding: 12px 20px 10px;
      background: rgba(239, 233, 223, 0.3);
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Carrusel — siempre horizontal con scroll */
    .carrusel-categoria-wrap {
      border: 2px solid rgba(107, 18, 0, 0.3);
      border-top: none;
      border-radius: 0 0 var(--radio) var(--radio);
      padding: 14px 20px 18px;
      background: rgba(239, 233, 223, 0.1);
    }

    .carrusel-categoria {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
    }
    .carrusel-categoria:active { cursor: grabbing; }

    /* Scrollbar fina estilizada */
    .carrusel-categoria::-webkit-scrollbar { height: 4px; }
    .carrusel-categoria::-webkit-scrollbar-track { background: var(--crema); border-radius: 2px; }
    .carrusel-categoria::-webkit-scrollbar-thumb { background: var(--vino); border-radius: 2px; opacity: 0.6; }

    /* Tarjetas con ancho fijo para que el scroll siempre funcione */
    .tarjeta-wrap {
      min-width: 200px;
      width: calc(25% - 12px);
      flex-shrink: 0;
      scroll-snap-align: start;
    }

    @media (max-width: 991px) {
      .tarjeta-wrap {
        min-width: 200px;
        width: 200px;
      }
    }

    @media (max-width: 575px) {
      .tarjeta-wrap {
        min-width: 160px;
        width: 160px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- CARRITO LATERAL -->
  <div id="cart-placeholder"></div>

  <!-- ============ PÁGINA PRODUCTOS ============ -->
  <main class="pagina-productos">
    <div class="container">
      <h1 class="titulo-pagina">Nuestros productos</h1>
      <div id="contenedor-categorias"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const contenedor = document.getElementById('contenedor-categorias');
      if (!contenedor) return;

      contenedor.innerHTML = categorias.map(cat => `
        <section class="seccion-categoria">
          <div class="categoria-cabecera">
            <h2 class="titulo-categoria">${cat.nombre}</h2>
          </div>
          <div class="carrusel-categoria-wrap">
            <div class="carrusel-categoria" id="carrusel-${cat.id}">
              ${cat.productos.map(p => {
                const productoCompleto = { ...p, rangoPrecios: cat.rangoPrecios, precioMin: cat.precioMin, precioMax: cat.precioMax };
                return `<div class="tarjeta-wrap">${htmlTarjetaProducto(productoCompleto)}</div>`;
              }).join('')}
            </div>
          </div>
        </section>`).join('');

      // Scroll horizontal con rueda/trackpad
      document.querySelectorAll('.carrusel-categoria').forEach(carrusel => {
        carrusel.addEventListener('wheel', (evento) => {
          // Si hay scroll vertical disponible en el carrusel, no interceptar
          if (Math.abs(evento.deltaX) > Math.abs(evento.deltaY)) return;
          evento.preventDefault();
          carrusel.scrollLeft += evento.deltaY * 1.5;
        }, { passive: false });

        // Drag horizontal con mouse
        let arrastrando = false;
        let inicioX = 0;
        let scrollInicialX = 0;

        carrusel.addEventListener('mousedown', (evento) => {
          arrastrando = true;
          inicioX = evento.pageX - carrusel.offsetLeft;
          scrollInicialX = carrusel.scrollLeft;
          carrusel.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (evento) => {
          if (!arrastrando) return;
          const x = evento.pageX - carrusel.offsetLeft;
          const desplazamiento = (x - inicioX) * 1.5;
          carrusel.scrollLeft = scrollInicialX - desplazamiento;
        });

        document.addEventListener('mouseup', () => {
          arrastrando = false;
          carrusel.style.userSelect = '';
        });
      });
    });
  </script>
</body>
</html>
