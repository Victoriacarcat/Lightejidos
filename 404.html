<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Lightejidos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .pagina-404 {
      background: var(--crema);
      min-height: calc(100vh - 70px - 200px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
    }

    .error-titulo {
      font-family: var(--fuente-display);
      font-size: var(--fs-56);
      font-weight: 700;
      color: var(--oscuro);
      margin-bottom: 8px;
    }

    .error-subtitulo {
      font-family: var(--fuente-cuerpo);
      font-size: var(--fs-16);
      font-weight: 700;
      color: var(--oscuro);
      margin-bottom: 32px;
    }

    .error-ilustracion {
      width: 100%;
      max-width: 480px;
      margin: 0 auto 40px;
    }

    .btn-volver {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--fuente-cuerpo);
      font-size: var(--fs-16);
      font-weight: 700;
      color: var(--oscuro);
      text-decoration: none;
      border-bottom: 2px solid var(--oscuro);
      padding-bottom: 4px;
      transition: color var(--transicion), border-color var(--transicion);
    }
    .btn-volver:hover {
      color: var(--vino);
      border-color: var(--vino);
    }
    .btn-volver svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- CARRITO LATERAL -->
  <div id="cart-placeholder"></div>

  <!-- ============ 404 ============ -->
  <main class="pagina-404">
    <h1 class="error-titulo">Oops!</h1>
    <p class="error-subtitulo">No es por aquí</p>

    <div class="error-ilustracion">
      <img src="img/404-ilustracion.svg" alt="Página no encontrada">
    </div>

    <a href="index.html" class="btn-volver" onclick="history.length > 1 ? (history.back(), event.preventDefault()) : null">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Volver
    </a>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/components.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
